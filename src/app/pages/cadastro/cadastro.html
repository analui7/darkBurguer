
  <div class="container">

    <!-- VOLTAR -->
    <div class="back">
      <span class="material-icons">arrow_back</span>

      <a href="../index.html" class="back-link">
        Voltar
      </a>
    </div>

    <!-- LOGO -->
    <div class="logo-area">

      <div class="logo-icon">
        <span class="material-icons">local_fire_department</span>
      </div>

      <h1 class="tituloCriar">Criar Conta</h1>

      <p class="subtitle">
        Junte-se à nossa comunidade
      </p>

    </div>

    <!-- CARD -->
    <div class="card">

      <!-- NOME -->
      <div class="input-group">
        <label>Nome completo</label>

        <input
          type="text"
          placeholder="Seu nome"
        >
      </div>

      <!-- EMAIL -->
      <div class="input-group">
        <label>Email</label>

        <input
          type="email"
          placeholder="seu@email.com"
        >
      </div>

      <!-- SENHA -->
      <div class="input-group">
        <label>Senha</label>

        <input
          type="password"
          placeholder="Mínimo 6 caracteres"
        >
      </div>

      <!-- CONFIRMAR -->
      <div class="input-group">
        <label>Confirmar senha</label>

        <input
          type="password"
          placeholder="Digite a senha novamente"
        >
      </div>

      <!-- BOTÃO -->
      <button class="btn">
        Cadastrar
      </button>

    </div>

  </div>
